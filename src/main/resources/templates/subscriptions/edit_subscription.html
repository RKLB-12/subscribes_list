<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Редактировать подписку</title>
    <link rel="stylesheet" href="/bulma/css/bulma.css">
    <meta charset="UTF-8">
</head>

<body>

<section class="section">

    <div class="container" style="max-width: 600px;">

        <h1 class="title">
            Редактировать подписку
        </h1>

        <form th:action="@{'/subscriptions/edit/' + ${subscription.id}}" method="post">
            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}">

            <div class="field">
                <label class="label">Название</label>
                <input class="input" type="text" name="name" th:value="${subscription.name}" required>
            </div>

            <div class="field">
                <label class="label">Компания</label>
                <input class="input" type="text" name="company" th:value="${subscription.company}" required>
            </div>

            <div class="field">
                <label class="label">Сайт</label>
                <input class="input" type="text" name="website" th:value="${subscription.website}">
            </div>

            <div class="field">
                <label class="label">Цена</label>
                <input class="input" type="number" step="0.01" name="price" th:value="${subscription.price}" required>
            </div>

            <div class="field">
                <label class="label">Дата начала</label>
                <input class="input" type="date" name="startDate" th:value="${subscription.startDate}" required>
            </div>

            <div class="field">
                <label class="label">Период (дней)</label>
                <input class="input" type="number" name="periodDays" th:value="${subscription.periodDays}"required>
            </div>

            <div class="buttons">
                <button class="button is-primary" type="submit">
                    Редактирование
                </button>
                <a href="/" class="button">
                    Отмена
                </a>
            </div>
        </form>
    </div>
</section>

</body>
</html>
